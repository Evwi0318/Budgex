services:
  postgres:
    image: postgres:18
    container_name: budgex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: budgex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - budgex-postgres-data:/var/lib/postgresql

volumes:
  budgex-postgres-data:
